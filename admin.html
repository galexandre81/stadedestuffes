    .edit-input, .edit-select, .edit-textarea {

      outline: none; width: 100%; transition: border-color .15s;
    }
    .edit-input:focus, .edit-select:focus, .edit-textarea:focus { border-color: var(--sky); }
    .edit-select option { background: #0F2F47; }
    .edit-textarea { resize: vertical; min-height: 60px; }
    .radio-row { display: flex; gap: 7px; flex-wrap: wrap; }
    .radio-opt-sm { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--frost); cursor: pointer; padding: 5px 10px; border: 1px solid rgba(75,163,217,.24); border-radius: 3px; transition: all .15s; user-select: none; }
    .radio-opt-sm input { display: none; }
    .radio-opt-sm.sel { background: rgba(75,163,217,.15); border-color: var(--sky); color: white; }
    .edit-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    .btn-save { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 18px; background: var(--sky); border: none; color: white; border-radius: 2px; cursor: pointer; transition: opacity .15s; }
    .btn-save:hover { opacity: .85; }
    .btn-cancel-edit { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 16px; background: transparent; border: 1px solid rgba(75,163,217,.25); color: var(--frost); border-radius: 2px; cursor: pointer; }

    /* ── STATES ─────────────────────────────────────────────── */
    .state-msg { padding: 48px 24px; text-align: center; color: var(--muted); font-style: italic; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(75,163,217,.3); border-top-color: var(--sky); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #1a4a2e; border-color: rgba(46,204,113,.4); }
    .toast.error   { background: #4a1a1a; border-color: rgba(231,76,60,.4); }
  </style>

</div>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-pretitle">Espace administration</div>
    <div class="login-title">Connexion</div>
    <div class="login-group">
      <label class="login-label">Email</label>

<div class="main" id="main-wrap" style="display:none;">

<div class="toast" id="toast"></div>

<script>
// ================================================================
// SUPABASE
// ================================================================
const SUPABASE_URL      = 'https://arkbrvzacbereyukqfte.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFya2JydnphY2JlcmV5dWtxZnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDg3ODUsImV4cCI6MjA5MDUyNDc4NX0.quPd-OGwu0HYjyvbdcdELlMvNieIBkyOuJHbC3TcM9E';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MONTHS_FR  = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];
let currentTab   = 'pending';
let allEvents    = [];

// ================================================================
// AUTH — Supabase Auth (email + mot de passe)
// ================================================================
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-pwd').value;
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('btn-login');

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Connexion…';

  const { error } = await sb.auth.signInWithPassword({ email, password: pwd });

  btn.disabled = false;
  btn.textContent = 'Accéder →';

  if (error) {
    errEl.style.display = 'block';
    document.getElementById('login-pwd').value = '';
    document.getElementById('login-pwd').focus();
  } else {
    showApp();
  }
}

document.getElementById('login-pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-pwd').focus();
});

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

function showApp() {
  document.getElementById('login-wrap').style.display  = 'none';
  document.getElementById('main-wrap').style.display   = 'block';
  document.getElementById('btn-logout').style.display  = 'inline-block';
  document.getElementById('admin-badge').style.display = 'inline-block';
  loadEvents();
}

// Restaurer session Supabase si déjà connecté
sb.auth.getSession().then(({ data }) => {
  if (data.session) showApp();
});

// ================================================================
// LOAD EVENTS
// ================================================================
async function loadEvents() {
  document.getElementById('events-list').innerHTML =
    '<div class="state-msg"><span class="spinner"></span> Chargement…</div>';
  try {
    const { data, error } = await sb
      .from('events')
      .select('id, title, sport, date_start, date_end, public_access, has_catering, notes, source_url, source_name, source_type, status')
      .order('date_start', { ascending: false });
    if (error) throw error;
    allEvents = data || [];
    renderTab(currentTab);
  } catch (err) {
    document.getElementById('events-list').innerHTML =
      '<div class="state-msg">Erreur de chargement. Vérifiez votre connexion et les droits d\'accès.</div>';
  }
}

function renderTab(tab) {
  const list    = allEvents.filter(e => tab === 'all' || e.status === tab);
  const pending = allEvents.filter(e => e.status === 'pending').length;
  document.getElementById('pending-count').textContent = `${pending} en attente`;

  const el = document.getElementById('events-list');
  if (!list.length) {
    el.innerHTML = '<div class="state-msg">Aucun événement dans cette catégorie.</div>';
    return;
  }
  el.innerHTML = list.map(buildCard).join('');
  el.querySelectorAll('.radio-opt-sm').forEach(opt => {
    opt.addEventListener('click', function() {
      const nm = this.querySelector('input').name;
      el.querySelectorAll(`input[name="${nm}"]`).forEach(r => r.closest('.radio-opt-sm').classList.remove('sel'));
      this.classList.add('sel');
      this.querySelector('input').checked = true;
    });
  });
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderTab(tab);
}

// ================================================================
// BUILD CARD
// ================================================================
function buildCard(ev) {
  const d     = ev.date_start ? new Date(ev.date_start + 'T12:00:00') : null;
  const day   = d ? String(d.getDate()).padStart(2,'0') : '?';
  const month = d ? MONTHS_FR[d.getMonth()] : '?';
  const dateEnd = ev.date_end && ev.date_end !== ev.date_start ? ` → ${ev.date_end}` : '';

  const statusLabel =
    ev.status === 'pending'   ? `<span style="color:#F5A623;font-weight:600;">● En attente</span>` :
    ev.status === 'published' ? `<span style="color:#2ECC71;font-weight:600;">✓ Publié</span>`     :
                                `<span style="color:#e74c3c;font-weight:600;">✗ Rejeté</span>`;

  const pubTxt = ev.public_access === true ? 'Oui' : ev.public_access === false ? 'Non' : 'Inconnu';
  const resTxt = ev.has_catering  === true ? 'Oui' : ev.has_catering  === false ? 'Non' : 'Inconnu';
  const pubVal = ev.public_access === true ? 'true' : ev.public_access === false ? 'false' : 'null';
  const resVal = ev.has_catering  === true ? 'true' : ev.has_catering  === false ? 'false' : 'null';

  const actionsBtns = ev.status === 'pending'
    ? `<button class="btn-publish"   onclick="publishEvent(${ev.id})">✓ Publier</button>
       <button class="btn-edit"      onclick="toggleEdit(${ev.id})">✎ Modifier</button>
       <button class="btn-reject"    onclick="rejectEvent(${ev.id})">✗ Rejeter</button>`
    : ev.status === 'published'
    ? `<button class="btn-edit"      onclick="toggleEdit(${ev.id})">✎ Modifier</button>
       <button class="btn-unpublish" onclick="unpublishEvent(${ev.id})">↩ Dépublier</button>
       <button class="btn-reject"    onclick="deleteEvent(${ev.id})">🗑 Supprimer</button>`
    : `<button class="btn-publish"   onclick="publishEvent(${ev.id})">↩ Republier</button>
       <button class="btn-reject"    onclick="deleteEvent(${ev.id})">🗑 Supprimer</button>`;

  return `
  <div class="ev-card ${ev.status}" id="card-${ev.id}">
    <div class="ev-head">
      <div class="ev-date-block">
        <div class="ev-day">${day}</div>
        <div class="ev-month">${month}</div>
      </div>
      <div class="ev-info">
        <div class="ev-sport">${ev.sport || '—'}</div>
        <div class="ev-title">${esc(ev.title)}</div>
        <div class="ev-meta">
          ${statusLabel} &nbsp;·&nbsp;
          <strong>Dates :</strong> ${ev.date_start || '?'}${dateEnd} &nbsp;·&nbsp;
          <strong>Public :</strong> ${pubTxt} &nbsp;·&nbsp;
          <strong>Restauration :</strong> ${resTxt}
          ${ev.source_url ? `<br><strong>Source :</strong> <a href="${esc(ev.source_url)}" target="_blank" rel="noopener">${esc(ev.source_url)}</a>` : ''}
          ${ev.notes ? `<br><strong>Notes :</strong> ${esc(ev.notes)}` : ''}
        </div>
      </div>
      <div class="ev-actions">${actionsBtns}</div>
    </div>

    <div class="ev-edit-panel" id="edit-${ev.id}">
      <div class="edit-grid">
        <div class="edit-group full">
          <label class="edit-label">Nom de l'événement</label>
          <input class="edit-input" id="e-title-${ev.id}" type="text" value="${esc(ev.title)}">
        </div>
        <div class="edit-group">
          <label class="edit-label">Date de début</label>
          <input class="edit-input" id="e-start-${ev.id}" type="date" value="${ev.date_start || ''}">
        </div>
        <div class="edit-group">
          <label class="edit-label">Date de fin</label>
          <input class="edit-input" id="e-end-${ev.id}" type="date" value="${ev.date_end || ''}">
        </div>
        <div class="edit-group">
          <label class="edit-label">Discipline</label>
          <select class="edit-select" id="e-sport-${ev.id}">
            ${['Ski de fond','Biathlon','Combiné nordique','Saut à ski','Autre / Plusieurs']
              .map(s => `<option${ev.sport===s?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="edit-group">
          <label class="edit-label">Accès public</label>
          <div class="radio-row">
            <label class="radio-opt-sm${pubVal==='true' ?' sel':''}"><input type="radio" name="ep-${ev.id}" value="true"  ${pubVal==='true' ?'checked':''}>Oui</label>
            <label class="radio-opt-sm${pubVal==='false'?' sel':''}"><input type="radio" name="ep-${ev.id}" value="false" ${pubVal==='false'?'checked':''}>Non</label>
            <label class="radio-opt-sm${pubVal==='null' ?' sel':''}"><input type="radio" name="ep-${ev.id}" value="null"  ${pubVal==='null'||!pubVal?'checked':''}>Inconnu</label>
          </div>
        </div>
        <div class="edit-group">
          <label class="edit-label">Restauration</label>
          <div class="radio-row">
            <label class="radio-opt-sm${resVal==='true' ?' sel':''}"><input type="radio" name="er-${ev.id}" value="true"  ${resVal==='true' ?'checked':''}>Oui</label>
            <label class="radio-opt-sm${resVal==='false'?' sel':''}"><input type="radio" name="er-${ev.id}" value="false" ${resVal==='false'?'checked':''}>Non</label>
            <label class="radio-opt-sm${resVal==='null' ?' sel':''}"><input type="radio" name="er-${ev.id}" value="null"  ${resVal==='null'||!resVal?'checked':''}>Inconnu</label>
          </div>
        </div>
        <div class="edit-group full">
          <label class="edit-label">Lien source</label>
          <input class="edit-input" id="e-url-${ev.id}" type="url" value="${esc(ev.source_url||'')}">
        </div>
        <div class="edit-group full">
          <label class="edit-label">Notes / Informations</label>
          <textarea class="edit-textarea" id="e-notes-${ev.id}">${esc(ev.notes||'')}</textarea>
        </div>
      </div>
      <div class="edit-actions">
        <button class="btn-save"        onclick="saveEvent(${ev.id})">Enregistrer</button>
        <button class="btn-cancel-edit" onclick="toggleEdit(${ev.id})">Annuler</button>
        ${ev.status === 'pending'
          ? `<button class="btn-publish" style="margin-left:auto;" onclick="saveAndPublish(${ev.id})">Enregistrer &amp; Publier →</button>`
          : ''}
      </div>
    </div>
  </div>`;
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function toggleEdit(id) {
  document.getElementById(`edit-${id}`).classList.toggle('open');
}

// ================================================================
// ACTIONS
// ================================================================
function getRadioVal(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  if (!el) return null;
  if (el.value === 'true')  return true;
  if (el.value === 'false') return false;
  return null;
}

async function publishEvent(id)   { await updateStatus(id, 'published'); }
async function unpublishEvent(id) { await updateStatus(id, 'pending'); }
async function rejectEvent(id) {
  if (!confirm('Rejeter cet événement ?')) return;
  await updateStatus(id, 'rejected');
}
async function deleteEvent(id) {
  if (!confirm('Supprimer définitivement cet événement ?')) return;
  const { error } = await sb.from('events').delete().eq('id', id);
  if (error) { showToast('Une erreur est survenue. Réessayez.', 'error'); return; }
  showToast('Événement supprimé.', 'success');
  allEvents = allEvents.filter(e => e.id !== id);
  renderTab(currentTab);
}
async function updateStatus(id, status) {
  const { error } = await sb.from('events').update({ status }).eq('id', id);
  if (error) { showToast('Une erreur est survenue. Réessayez.', 'error'); return; }
  const labels = { published: 'Publié ✓', pending: 'Dépublié', rejected: 'Rejeté' };
  showToast(labels[status] || 'Mis à jour.', 'success');
  const ev = allEvents.find(e => e.id === id);
  if (ev) ev.status = status;
  renderTab(currentTab);
}
async function saveEvent(id) {
  const payload = buildPayload(id);
  const { error } = await sb.from('events').update(payload).eq('id', id);
  if (error) { showToast('Une erreur est survenue. Réessayez.', 'error'); return; }
  showToast('Modifications enregistrées.', 'success');
  const ev = allEvents.find(e => e.id === id);
  if (ev) Object.assign(ev, payload);
  renderTab(currentTab);
}
async function saveAndPublish(id) {
  const payload = { ...buildPayload(id), status: 'published' };
  const { error } = await sb.from('events').update(payload).eq('id', id);
  if (error) { showToast('Une erreur est survenue. Réessayez.', 'error'); return; }
  showToast('Enregistré et publié ✓', 'success');
  const ev = allEvents.find(e => e.id === id);
  if (ev) Object.assign(ev, payload);
  renderTab(currentTab);
}
function buildPayload(id) {
  return {
    title:         document.getElementById(`e-title-${id}`).value.trim(),
    date_start:    document.getElementById(`e-start-${id}`).value || null,
    date_end:      document.getElementById(`e-end-${id}`).value   || null,
    sport:         document.getElementById(`e-sport-${id}`).value,
    public_access: getRadioVal(`ep-${id}`),
    has_catering:  getRadioVal(`er-${id}`),
    source_url:    document.getElementById(`e-url-${id}`).value.trim()   || null,
    notes:         document.getElementById(`e-notes-${id}`).value.trim() || null,
  };
}

// ================================================================
// TOAST
// ================================================================
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
