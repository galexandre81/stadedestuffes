name: Scrape Events

on:
  schedule:
    - cron: '30 */8 * * *'   # toutes les 8h (0h30, 8h30, 16h30 UTC)
  workflow_dispatch:           # déclenchement manuel depuis GitHub Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 supabase python-dotenv

      - name: Run event scraper
        run: python scrape_events.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
